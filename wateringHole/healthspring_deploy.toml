# SPDX-License-Identifier: AGPL-3.0-only
#
# biomeOS capability graph for healthSpring diagnostic niche.
#
# healthSpring is a NICHE — the diagnostic pipeline emerges from primal
# composition, not from a monolithic binary. This graph declares which
# capabilities each stage requires; biomeOS resolves providers at runtime.
#
# The workflow graphs in graphs/ define the actual execution:
#   graphs/healthspring_patient_assessment.toml  (ConditionalDag)
#   graphs/healthspring_trt_scenario.toml        (Sequential)
#   graphs/healthspring_microbiome_analysis.toml (Sequential)
#   graphs/healthspring_biosignal_monitor.toml   (Continuous @ 250 Hz)
#
# Niche manifest: graphs/healthspring_niche.toml
# Niche deployment: graphs/healthspring_niche_deploy.toml

[graph]
name = "healthspring-diagnostic"
description = "Human health diagnostic pipeline: PK/PD + microbiome + biosignal + endocrine → composite risk"

# --- Infrastructure ---

[[stages]]
name = "beardog"
primal = "beardog"
capabilities = ["crypto.identity", "crypto.verify"]

[[stages]]
name = "songbird"
primal = "songbird"
depends_on = ["beardog"]
capabilities = ["net.http", "net.discovery"]

# --- Data ---

[[stages]]
name = "nestgate"
primal = "nestgate"
depends_on = ["songbird"]
capabilities = [
    "data.ncbi_search",
    "data.ncbi_fetch",
    "storage.store",
    "storage.retrieve",
]

# --- Compute ---

[[stages]]
name = "toadstool"
primal = "toadstool"
depends_on = ["songbird"]
capabilities = [
    "compute.execute",
    "compute.submit",
    "compute.gpu.dispatch",
    "compute.gpu.fused_pipeline",
    "compute.gpu.mm_batch",
    "compute.gpu.scfa_batch",
    "compute.gpu.beat_classify_batch",
    "compute.npu.dispatch",
    "compute.streaming.execute",
    "compute.nucleus.plan_dispatch",
    "compute.pcie.p2p_transfer",
]

# --- Science: PK/PD ---

[[stages]]
name = "pkpd"
primal = "healthspring"
depends_on = ["toadstool"]
capabilities = [
    "science.pkpd.hill_dose_response",
    "science.pkpd.one_compartment_pk",
    "science.pkpd.two_compartment_pk",
    "science.pkpd.pbpk_simulate",
    "science.pkpd.population_pk",
    "science.pkpd.allometric_scale",
    "science.pkpd.auc_trapezoidal",
    "science.pkpd.nlme_foce",
    "science.pkpd.nlme_saem",
    "science.pkpd.nca_analysis",
    "science.pkpd.cwres_diagnostics",
    "science.pkpd.vpc_simulate",
    "science.pkpd.gof_compute",
    "science.pkpd.michaelis_menten_nonlinear",
]

# --- Science: Microbiome ---

[[stages]]
name = "microbiome"
primal = "healthspring"
depends_on = ["toadstool", "nestgate"]
capabilities = [
    "science.microbiome.shannon_index",
    "science.microbiome.simpson_index",
    "science.microbiome.pielou_evenness",
    "science.microbiome.chao1",
    "science.microbiome.anderson_gut",
    "science.microbiome.colonization_resistance",
    "science.microbiome.fmt_blend",
    "science.microbiome.bray_curtis",
    "science.microbiome.antibiotic_perturbation",
    "science.microbiome.scfa_production",
    "science.microbiome.gut_brain_serotonin",
    "science.microbiome.qs_gene_profile",
    "science.microbiome.qs_effective_disorder",
]

# --- Science: Biosignal ---

[[stages]]
name = "biosignal"
primal = "healthspring"
depends_on = ["toadstool"]
capabilities = [
    "science.biosignal.pan_tompkins",
    "science.biosignal.hrv_metrics",
    "science.biosignal.ppg_spo2",
    "science.biosignal.eda_analysis",
    "science.biosignal.eda_stress_detection",
    "science.biosignal.arrhythmia_classification",
    "science.biosignal.fuse_channels",
    "science.biosignal.wfdb_decode",
]

# --- Science: Endocrine ---

[[stages]]
name = "endocrine"
primal = "healthspring"
depends_on = ["toadstool"]
capabilities = [
    "science.endocrine.testosterone_pk",
    "science.endocrine.trt_outcomes",
    "science.endocrine.population_trt",
    "science.endocrine.hrv_trt_response",
    "science.endocrine.cardiac_risk",
]

# --- Diagnostic pipeline (composes all tracks) ---

[[stages]]
name = "diagnostic"
primal = "healthspring"
depends_on = ["pkpd", "microbiome", "biosignal", "endocrine"]
capabilities = [
    "science.diagnostic.assess_patient",
    "science.diagnostic.population_montecarlo",
    "science.diagnostic.composite_risk",
]

# --- Clinical Scenarios ---

[[stages]]
name = "clinical"
primal = "healthspring"
depends_on = ["diagnostic"]
capabilities = [
    "science.clinical.trt_scenario",
    "science.clinical.patient_parameterize",
    "science.clinical.risk_annotate",
]

# --- Visualization ---

[[stages]]
name = "petaltongue"
primal = "petaltongue"
depends_on = ["diagnostic", "clinical"]
capabilities = [
    "ui.scenario.render",
    "ui.scenario.v16_study",
    "ui.scenario.compute_pipeline",
    "ui.scenario.full_study",
    "ui.graph.display",
    "ui.tui.display",
    "ui.web.serve",
    "ui.audio.sonify",
    "ui.motor.set_mode",
    "ui.motor.set_panel",
    "ui.ipc.push_render",
    "ui.ipc.stream_session",
    "ui.ipc.patient_explorer",
]

# --- Storage (results) ---

[[stages]]
name = "results"
primal = "nestgate"
depends_on = ["diagnostic", "petaltongue"]
capabilities = [
    "storage.store",
    "storage.snapshot",
]
