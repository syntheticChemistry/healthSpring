# cargo-deny configuration — healthSpring dep hygiene.
# Pattern absorbed from groundSpring V115 + airSpring v0.8.4.

[graph]
targets = []
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
yanked = "deny"
unmaintained = "warn"

[licenses]
unlicensed = "deny"
confidence-threshold = 0.8
allow = [
    "AGPL-3.0-or-later",
    "AGPL-3.0",
    "AGPL-3.0+",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# ecoBin compliance: zero C dependencies in application code.
# These crates pull in native C libraries and are forbidden.
# Exception: ring/cc are allowed ONLY as transitive deps of ureq (feature-gated
# behind `nestgate`). Default build has zero C deps. Evolution path: ring →
# rustls-rustcrypto (pure Rust) when it stabilizes.
deny = [
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl", wrappers = [] },
    { crate = "native-tls", wrappers = [] },
    { crate = "aws-lc-sys", wrappers = [] },
    { crate = "aws-lc-rs", wrappers = [] },
    { crate = "ring", wrappers = ["rustls"] },
    { crate = "libz-sys", wrappers = [] },
    { crate = "bzip2-sys", wrappers = [] },
    { crate = "curl-sys", wrappers = [] },
    { crate = "libsqlite3-sys", wrappers = [] },
    { crate = "cmake", wrappers = [] },
    { crate = "cc", wrappers = ["ring"] },
    { crate = "pkg-config", wrappers = [] },
    { crate = "vcpkg", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
