# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration — healthSpring dep hygiene.
# Pattern absorbed from airSpring v0.8.4.

[advisories]
vulnerability = "deny"
yanked = "deny"
unmaintained = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "AGPL-3.0-or-later",
    "AGPL-3.0",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]

[bans]
wildcards = "deny"
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
