[package]
name = "healthspring-exp085"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Exp085: barraCuda CPU vs GPU timing for V16 ops — proves math portability"

[dependencies]
healthspring-barracuda = { path = "../../barracuda" }
healthspring-forge = { path = "../../metalForge/forge" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "exp085_gpu_vs_cpu_v16_bench"
path = "src/main.rs"
