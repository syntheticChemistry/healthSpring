name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt, llvm-tools-preview
    - name: Format check
      run: cargo fmt --check --all
    - name: Clippy (pedantic)
      run: cargo clippy --workspace -- -D warnings -W clippy::pedantic -W clippy::nursery
    - name: Doc check
      run: cargo doc --workspace --no-deps
    - name: Dependency audit (cargo-deny)
      uses: EmbarkStudios/cargo-deny-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Build
      run: cargo build --workspace
    - name: Unit tests
      run: cargo test --workspace
    - name: Coverage (library, fail below 90%)
      run: |
        cargo llvm-cov --workspace --lib --fail-under-lines 90 \
          --ignore-filename-regex 'gpu/(context|dispatch)\.rs'

  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build workspace
      run: cargo build --workspace --release
    - name: Run all validation binaries
      run: |
        set -e
        for toml in experiments/exp*/Cargo.toml; do
          bin=$(grep 'name = "exp' "$toml" 2>/dev/null | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -n "$bin" ]; then
            echo "=== $bin ==="
            cargo run --release --bin "$bin"
            echo
          fi
        done
    - name: Python cross-validation
      run: |
        python3 control/pkpd/cross_validate.py

  test-gpu:
    runs-on: ubuntu-latest
    if: false  # Enable when GPU runners available
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Test GPU
      run: cargo test --workspace --features gpu
