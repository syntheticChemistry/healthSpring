name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC — GPU + cross-compile

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt, llvm-tools-preview
    - name: Format check
      run: cargo fmt --check --all
    - name: Clippy (pedantic)
      run: cargo clippy --workspace -- -D warnings -W clippy::pedantic -W clippy::nursery
    - name: Doc check
      run: cargo doc --workspace --no-deps
    - name: Dependency audit (cargo-deny)
      uses: EmbarkStudios/cargo-deny-action@v2
    - name: Verify barraCuda version (pinned to v0.3.7 / c04d848)
      run: |
        BARRACUDA_VERSION=$(cargo metadata --format-version=1 --no-deps \
          | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='healthspring-barracuda'))")
        echo "healthspring-barracuda version: $BARRACUDA_VERSION"
        grep -q 'barracuda.*c04d848' ecoPrimal/Cargo.toml \
          || (echo "ERROR: barraCuda pin comment missing or changed — expected rev c04d848" && exit 1)

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Build
      run: cargo build --workspace
    - name: Unit tests
      run: cargo test --workspace
    - name: Coverage (library, fail below 90%)
      run: cargo llvm-cov --workspace --lib --fail-under-lines 90

  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build workspace
      run: cargo build --workspace --release
    - name: Run all validation binaries
      run: |
        set -e
        for toml in experiments/exp*/Cargo.toml; do
          while IFS= read -r bin; do
            if [ -n "$bin" ]; then
              echo "=== $bin ==="
              cargo run --release --bin "$bin"
              echo
            fi
          done < <(grep 'name = "exp' "$toml" 2>/dev/null | sed 's/.*"\(.*\)".*/\1/')
        done
    - name: Python cross-validation
      run: python3 control/pkpd/cross_validate.py

  composition:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Composition integration tests
      run: cargo test -p healthspring-barracuda --test integration_composition
    - name: Composition validation binaries (Tier 4)
      run: |
        set -e
        for bin in exp112_composition_pkpd \
                   exp113_composition_microbiome \
                   exp114_composition_health_triad \
                   exp115_composition_proto_nucleate \
                   exp116_composition_provenance; do
          echo "=== $bin ==="
          cargo run --release --bin "$bin"
          echo
        done

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Install cross-compilation tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -yq musl-tools
        if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
          sudo apt-get install -yq gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
        fi
    - name: Build ecoBin (static PIE)
      run: cargo build --workspace --release --target ${{ matrix.target }}
    - name: Verify static linkage
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        file target/${{ matrix.target }}/release/healthspring_primal | grep -q "statically linked"
        echo "Static PIE verified"
    - name: Upload ecoBin artifact
      uses: actions/upload-artifact@v4
      with:
        name: healthspring-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/healthspring_primal

  test-gpu:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Test GPU
      run: cargo test --workspace --features gpu
