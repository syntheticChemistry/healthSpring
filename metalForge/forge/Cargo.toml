[package]
name = "healthspring-forge"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "metalForge dispatch validation for healthSpring"

[features]
default = []
gpu = ["dep:wgpu", "dep:pollster"]
npu = []

[dependencies]
healthspring-barracuda = { path = "../../ecoPrimal" }
wgpu = { version = "28", optional = true }
pollster = { version = "0.4", optional = true }

[dev-dependencies]
approx = "0.5"
