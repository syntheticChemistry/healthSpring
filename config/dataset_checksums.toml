# healthSpring Dataset Checksum Manifest
# SHA-256 checksums for all external data dependencies.
# Provenance: each entry records the source, expected size, and integrity hash.
# Verified datasets have `verified = true`.
#
# Usage: validation binaries check this manifest before trusting cached data.
# NestGate content-addressed storage provides runtime verification;
# this file is the offline/CI fallback.
#
# Last updated: V64t (May 17, 2026)

[qs_gene_matrix]
description = "Quorum-sensing gene interaction matrix for QS-augmented Anderson localization"
source = "NCBI Gene / UniProt cross-reference (curated)"
file = "qs_gene_matrix.json"
sha256 = "pending"
verified = false
notes = "Fetch gap: requires NCBI Entrez API or local curation. Blocked on data provider wiring (Tier 2+ NestGate)."

[mitbih_records]
description = "MIT-BIH Arrhythmia Database records for beat classification validation"
