]

# ── Test fixtures (excluded from drift checks) ───────────────────────────

[test_fixtures]
owner = "tests"
methods = [
    "test.method",
    "foo.bar",
]

# ── False positives (dotted strings that are not RPC methods) ────────────

[false_positives]
owner = "none"
methods = [
    "test.sock",
    "tests.rs",
    "manifest.toml",
    "baseline.json",
    "biomeos.sock",
    "mock_pt.sock",
]
