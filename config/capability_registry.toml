#
# Canonical Capability Registry — healthSpring
#
# Every JSON-RPC method string used in healthSpring source code (library,
# guidestone, primal server, experiments) AND referenced in deploy graph TOML
# files must appear in this registry.
#
# CI checks:
#   tools/check_method_strings.sh — validates Rust source against this file
#   cargo test -p healthspring-barracuda registry_cross_sync — validates
#   against primalSpring's canonical config/capability_registry.toml
#
# Structure: [domain] with `methods = [...]` listing all known methods in
# that domain. `owner` names the primal that serves them (or "healthspring"
# for locally-served science). `locality` is "local" if healthSpring serves
# the method in-process, "routed" if discovered via by_capability IPC, or
# "consumed" if called outbound only.
#
# Adding a new method: add it here first, then use it in code.
# Removing a method: grep the codebase, remove all uses, then remove here.

# ── Science domains (served locally by healthSpring) ─────────────────────

