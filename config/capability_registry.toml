# ── barraCuda IPC migration surface ──────────────────────────────────────
# Methods available on barraCuda's JSON-RPC surface that healthSpring
# calls via library import today but validates via IPC in guideStone.

[stats]
owner = "barracuda"
locality = "consumed"
methods = [
    "stats.mean",
    "stats.std_dev",
    "stats.variance",
    "stats.correlation",
    "stats.hill",
    "stats.shannon_from_frequencies",
    "stats.simpson",
    "stats.chao1_classic",
    "stats.bray_curtis",
]

[special]
owner = "barracuda"
locality = "consumed"
methods = [
    "special.anderson_diagonalize",
]

[rng]
owner = "barracuda"
locality = "consumed"
methods = [
    "rng.uniform",
]

# barraCuda health-domain compositions consumed by healthSpring
[health_barracuda]
owner = "barracuda"
locality = "consumed"
methods = [
